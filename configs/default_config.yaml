# configs/default_config.yaml

# 1. IO 与路径配置
io:
  data_path: "data/servo_dataset_dp.zarr" 
  output_dir: "Results_Ablation_Final"
  target_episode: "episode_2" # 默认分析的 Episode

# 2. 机器人运动学参数
kinematics:
  dt: 0.03333333333333333  # 采样时间步长 (30Hz)
  filter_win_pose: 31      # 机器人位姿 Savitzky-Golay 滤波窗口
  poly_order_pose: 3       # 机器人位姿滤波多项式阶数

# 3. 感知层参数 (NLM + 光流 + 掩膜)
perception:
  filter_win_feat: 15      # 图像特征滤波窗口
  poly_order_feat: 2       # 图像特征滤波多项式阶数
  trim_edge: 20            # 丢弃微分畸变的边缘帧数
  pe_threshold_ratio: 0.15 # 🎯 持续激励 (PE) 门控阈值比例
  
  # NLM (Non-Local Means) 强效保边去噪
  nlm:
    h: 8                   # 过滤强度 (你的 PoC 版设为 8, 效果最佳)
    template_window: 5     # 计算权重的图块大小
    search_window: 21      # 搜索相似块的窗口大小

  # Farneback 稠密光流算法参数
  optical_flow:
    pyr_scale: 0.5
    levels: 3
    winsize: 15
    iterations: 3
    poly_n: 5
    poly_sigma: 1.2
    flags: 0

  # 声学置信度掩膜 W(u,v) 参数
  masking:
    noise_floor: 20        # 背景噪声滤除阈值
    sigma_sq: 2500.0       # 梯度置信度方差 (50.0^2)

# 4. 信号对齐与评估参数 (DTW + 滤波)
alignment:
  fs: 30.0                 # 信号采样频率
  cutoff_freq: 2.0         # 🎯 Butterworth 低通滤波截止频率 (保留宏观动作)
  filter_order: 4          # 滤波器阶数
  max_lag: 25              # 互相关对齐的最大搜索帧数
  residual_smooth_win: 15  # 残差平滑窗口